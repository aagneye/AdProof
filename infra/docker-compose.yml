services:
  postgres:
    image: postgres:16-alpine
    container_name: adproof-postgres
    environment:
      POSTGRES_USER: adproof
      POSTGRES_PASSWORD: adproof
      POSTGRES_DB: adproof
    ports:
      - "5432:5432"
    volumes:
      - adproof_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adproof"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: adproof-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  adproof_pgdata:
